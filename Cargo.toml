[package]
name = "beta_k1"
version = "0.1.0"
edition = "2021"

[features]
# Default: std + the `pow` backend. Suitable for hosted desktop use.
default = ["pow", "std"]

# Sampler backend selection. Exactly one should be active. With both,
# `pow` wins; with neither, the crate fails to compile.
#
# `pow`: direct `u.powf(1/k)`. Fast on hardware with a fast libm pow.
pow = []
# `rejection`: Exp(1) rejection sampling. May win on hardware with slow
# pow but adequate log/exp; verify on target before relying on this.
rejection = []

# `std`: pulls in std's libm bindings via num-traits, plus rand's stdlib
# integration (StdRng, Standard distribution etc.). Required to build
# the test_driver binary.
std = ["num-traits/std", "rand/std", "rand/std_rng", "rand_distr/std"]

# `libm`: routes transcendental math (`ln`, `powf`) through the `libm`
# crate via `num-traits`. Use this in `no_std` builds: enable exactly
# one of `std` or `libm`.
libm = ["num-traits/libm"]

[dependencies]
num-traits = { version = "0.2", default-features = false }
rand = { version = "0.8", default-features = false }
rand_distr = { version = "0.4", default-features = false }

[[bin]]
name = "test_driver"
path = "src/main.rs"
# The driver uses Vec, Instant, println!, StdRng — std-only. Hide it
# from no_std builds so they don't try (and fail) to compile it.
required-features = ["std"]

[lib]
name = "beta_k1"
path = "src/lib.rs"
